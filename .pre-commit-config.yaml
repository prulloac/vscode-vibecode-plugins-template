repos:
  # General file checks
  - repo: https://github.com/pre-commit/pre-commit-hooks
    rev: v4.5.0
    hooks:
      - id: trailing-whitespace
      - id: end-of-file-fixer
      - id: check-yaml
      - id: check-added-large-files
        args: ['--maxkb=500']
      - id: check-json
      - id: detect-private-key

  # Python formatting
  - repo: https://github.com/psf/black
    rev: 23.12.1
    hooks:
      - id: black
        language_version: python3
        # Only run on files we explicitly want to format
        files: ^(\.opencode|mcp\.json|opencode\.json)

  # Python import sorting
  - repo: https://github.com/pycqa/isort
    rev: 5.13.2
    hooks:
      - id: isort
        args: ['--profile', 'black']
        # Only run on files we explicitly want to format
        files: ^(\.opencode|mcp\.json|opencode\.json)

  # Spell checking (optional - uncomment to enable)
  # - repo: https://github.com/codespell-project/codespell
  #   rev: v2.2.6
  #   hooks:
  #     - id: codespell
  #       args: ['--ignore-words-list=crate,nd,sav,ser']

  # Commit message validation (non-AI)
  - repo: local
    hooks:
      - id: validate-commit-msg-conventional
        name: validate commit message (conventional commits)
        entry: .pre-commit-hooks/validate-commit-msg-conventional.sh
        language: script
        stages: [commit-msg]
        always_run: true

      - id: validate-commit-msg-max
        name: validate commit message max length (100)
        entry: .pre-commit-hooks/validate-commit-msg-max.sh
        args: ['100']
        language: script
        stages: [commit-msg]
        always_run: true

default_language_version:
  python: python3
